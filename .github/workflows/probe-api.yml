name: Probe DailyHotApi

# 一次性探测: api-hot.imsyy.top 在 GitHub Actions 机房能不能用
# 不动主 pipeline,只是诊断
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Probe API endpoints
        env:
          DAILYHOT_API_BASE: ${{ secrets.DAILYHOT_API_BASE }}
        run: |
          python << 'EOF'
          import os, json, urllib.request, urllib.error

          # 优先用自部署,否则用作者公共实例
          base = os.environ.get("DAILYHOT_API_BASE", "").strip()
          if base:
              bases = [base.rstrip("/")]
              print(f"用自部署地址: {base}")
          else:
              bases = ["https://api-hot.imsyy.top"]
              print("无 DAILYHOT_API_BASE,用公共实例 api-hot.imsyy.top")

          platforms = ["weibo", "zhihu", "bilibili", "douyin", "baidu", "tieba", "douban"]

          for b in bases:
              print(f"\n========== {b} ==========")
              total_items = 0
              ok_count = 0
              for p in platforms:
                  url = f"{b}/{p}"
                  try:
                      req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                      with urllib.request.urlopen(req, timeout=20) as resp:
                          raw = resp.read().decode("utf-8", errors="ignore")
                      # 判断是 JSON 还是 HTML(前端 SPA 拦截会返回 HTML)
                      stripped = raw.lstrip()
                      if not stripped.startswith("{") and not stripped.startswith("["):
                          print(f"  {p:10} → 非 JSON (可能是 HTML/404), 前80字符: {stripped[:80]!r}")
                          continue
                      data = json.loads(raw)
                      code = data.get("code")
                      items = data.get("data", []) or []
                      n = len(items)
                      total_items += n
                      if code == 0 and n > 0:
                          ok_count += 1
                          # 打印前 3 条标题样本
                          titles = [str(it.get("title", ""))[:30] for it in items[:3]]
                          print(f"  {p:10} → ✅ {n} 条, 样例: {titles}")
                      else:
                          print(f"  {p:10} → code={code}, {n} 条, msg={data.get('message','')}")
                  except urllib.error.HTTPError as e:
                      print(f"  {p:10} → HTTP {e.code}")
                  except Exception as e:
                      print(f"  {p:10} → 失败: {type(e).__name__}: {e}")

              print(f"\n汇总: {ok_count}/{len(platforms)} 平台可用, 总 {total_items} 条")
              if ok_count >= 3 and total_items >= 50:
                  print("✅ DailyHotApi 可用,可以切回去")
              else:
                  print("❌ DailyHotApi 不可用或数据太少")
          EOF
